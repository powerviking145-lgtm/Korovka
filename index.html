<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>УВЕЛИЧЬ НАДОЙ 🐄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-top: #f5f0e8;
      --bg-bottom: #e8dcc8;
      --udder-pink: #f8b4b4;
      --udder-shadow: #e89a9a;
      --bucket-wood: #8b6f47;
      --bucket-dark: #6b5235;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    }

    #app {
      width: 100%;
      height: 100dvh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
      position: relative;
      overflow: hidden;
    }

    /* ====== ЭКРАНЫ ====== */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 1;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 2;
    }

    /* ====== ЛАНДШАФТ-ЗАГЛУШКА ====== */
    #landscape-block {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #2d2d2d;
      color: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      font-family: 'Bangers', cursive;
      font-size: 1.5rem;
      text-align: center;
      padding: 2rem;
    }

    @media (orientation: landscape) {
      #landscape-block { display: flex; }
      #app { display: none; }
    }

    /* ====== СТАРТОВЫЙ ЭКРАН ====== */
    #screen-menu {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      gap: 1.5rem;
    }

    .logo {
      font-family: 'Bangers', cursive;
      font-size: clamp(2.5rem, 12vw, 4rem);
      color: #2d1810;
      text-align: center;
      line-height: 1.1;
      transform: rotate(-2deg);
      text-shadow: 3px 3px 0 #f8b4b4;
      letter-spacing: 0.05em;
    }

    .logo-emoji {
      font-size: clamp(4rem, 20vw, 6rem);
      display: block;
      margin-bottom: 0.25rem;
    }

    .menu-record {
      font-size: 1.1rem;
      font-weight: 700;
      color: #5a4a3a;
    }

    .menu-record span {
      color: #c45c26;
      font-size: 1.4rem;
    }

    .btn {
      font-family: 'Bangers', cursive;
      font-size: 1.75rem;
      letter-spacing: 0.08em;
      padding: 0.85rem 2.5rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.2);
    }

    .btn-primary {
      background: linear-gradient(180deg, #ff9f43 0%, #ee5a24 100%);
      color: #fff;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
    }

    .btn-secondary {
      background: linear-gradient(180deg, #74b9ff 0%, #0984e3 100%);
      color: #fff;
      font-size: 1.25rem;
      padding: 0.65rem 1.75rem;
    }

    /* ====== ИГРОВОЙ ЭКРАН ====== */
    #screen-game {
      flex-direction: column;
      justify-content: flex-start;
      padding-top: calc(var(--safe-top) + 0.25rem);
      background: linear-gradient(180deg, var(--bg-top) 0%, #dce8c8 55%, var(--bg-bottom) 100%);
    }

    /* Топ-бар — 10% */
    .top-bar {
      flex: 0 0 10%;
      min-height: 48px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
    }

    .record-badge {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-weight: 800;
      font-size: 1rem;
      color: #5a4a3a;
    }

    .record-badge .value {
      font-size: 1.15rem;
      color: #c45c26;
    }

    .timer {
      font-family: 'Courier New', monospace;
      font-size: clamp(2.5rem, 10vw, 3.5rem);
      font-weight: 900;
      color: #2d1810;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .timer.warning {
      color: #ee5a24;
      animation: timer-pulse 0.5s ease infinite alternate;
    }

    @keyframes timer-pulse {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    .liters-display {
      font-weight: 800;
      font-size: 1rem;
      color: #2d1810;
      text-align: right;
    }

    .liters-display .value {
      font-size: 1.25rem;
      color: #0984e3;
    }

    /* Корова сзади + вымя — 65% (крупный кадр, обрезка по краям) */
    .cow-rear-zone {
      flex: 1 1 65%;
      width: 100%;
      min-height: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .cow-rear {
      position: relative;
      width: min(92vw, 340px);
      height: 100%;
      margin: 0 auto;
    }

    /* Зад коровы — виден только низ спины и бёдра */
    .cow-hind {
      position: absolute;
      top: -8%;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 72%;
      z-index: 1;
    }

    .cow-flank {
      position: absolute;
      inset: 0;
      background: #f2f2f2;
      border: 3px solid #2d2d2d;
      border-radius: 42% 42% 28% 28% / 55% 55% 35% 35%;
      box-shadow: inset 0 -20px 30px rgba(0,0,0,0.06);
    }

    .cow-flank::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 18%;
      background: linear-gradient(180deg, var(--bg-top) 0%, transparent 100%);
      border-radius: inherit;
      z-index: 2;
    }

    .cow-spine {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 45%;
      background: #e0e0e0;
      border-radius: 4px;
      border-left: 1px solid #ccc;
      border-right: 1px solid #bbb;
    }

    .cow-spot {
      position: absolute;
      background: #2d2d2d;
      border-radius: 50%;
    }

    .cow-spot.s1 {
      width: clamp(36px, 12vw, 52px);
      height: clamp(28px, 9vw, 40px);
      top: 22%;
      left: 12%;
    }

    .cow-spot.s2 {
      width: clamp(28px, 9vw, 40px);
      height: clamp(22px, 7vw, 32px);
      top: 38%;
      right: 14%;
    }

    .cow-spot.s3 {
      width: clamp(20px, 6vw, 28px);
      height: clamp(16px, 5vw, 22px);
      bottom: 28%;
      left: 22%;
    }

    .cow-tail {
      position: absolute;
      top: 8%;
      left: 50%;
      width: 14px;
      height: clamp(50px, 14vh, 72px);
      background: #2d2d2d;
      border-radius: 0 0 8px 8px;
      transform-origin: top center;
      transform: translateX(-50%) rotate(8deg);
    }

    .cow-tail::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 22px;
      height: 14px;
      background: #2d2d2d;
      border-radius: 50%;
    }

    .cow-leg {
      position: absolute;
      bottom: -6%;
      width: clamp(22px, 7vw, 30px);
      height: clamp(40px, 12vh, 56px);
      background: #f2f2f2;
      border: 3px solid #2d2d2d;
      border-radius: 0 0 10px 10px;
      z-index: 0;
    }

    .cow-leg.l1 { left: 6%; }
    .cow-leg.l2 { left: 22%; }
    .cow-leg.l3 { right: 22%; }
    .cow-leg.l4 { right: 6%; }

    /* Вымя — на животе, в том же кадре */
    .udder {
      position: absolute;
      bottom: 4%;
      left: 50%;
      transform: translateX(-50%);
      width: min(78vw, 240px);
      height: clamp(100px, 28vh, 150px);
      cursor: pointer;
      touch-action: manipulation;
      z-index: 3;
    }

    .udder.squish {
      animation: udder-squish 0.08s ease;
    }

    @keyframes udder-squish {
      50% { transform: translateX(-50%) scale(0.92); }
    }

    .udder-bag {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: 88%;
      height: 72px;
      background: var(--udder-pink);
      border: 3px solid var(--udder-shadow);
      border-radius: 50% 50% 42% 42%;
      box-shadow: inset 0 -10px 18px rgba(0,0,0,0.1);
    }

    .udder-bag::before,
    .udder-bag::after {
      content: '';
      position: absolute;
      width: 48px;
      height: 48px;
      background: var(--udder-pink);
      border: 3px solid var(--udder-shadow);
      border-radius: 50%;
      top: -18px;
    }

    .udder-bag::before { left: 10%; }
    .udder-bag::after { right: 10%; }

    .teat {
      position: absolute;
      width: 20px;
      height: 34px;
      background: var(--udder-pink);
      border: 2px solid var(--udder-shadow);
      border-radius: 40% 40% 50% 50%;
      bottom: 0;
      z-index: 2;
    }

    .teat::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      background: #e88;
      border-radius: 50%;
    }

    .teat.t1 { left: 14%; }
    .teat.t2 { left: 36%; }
    .teat.t3 { right: 36%; }
    .teat.t4 { right: 14%; }

    /* Ведро — 20% */
    .bucket-zone {
      flex: 0 0 20%;
      min-height: 80px;
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 0.5rem;
      position: relative;
    }

    .bucket-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bucket {
      position: relative;
      width: 90px;
      height: 75px;
    }

    .bucket-rim {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 14px;
      background: var(--bucket-dark);
      border-radius: 50%;
      z-index: 3;
      border: 2px solid #4a3825;
    }

    .bucket-body {
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 86px;
      height: 68px;
      background: linear-gradient(90deg, var(--bucket-wood) 0%, #a08060 30%, var(--bucket-wood) 60%, #6b5235 100%);
      border: 3px solid var(--bucket-dark);
      border-radius: 0 0 12px 12px;
      clip-path: polygon(8% 0%, 92% 0%, 100% 100%, 0% 100%);
      overflow: hidden;
      z-index: 2;
    }

    .bucket-milk {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0%;
      background: linear-gradient(180deg, #fff 0%, #f0ebe0 100%);
      transition: height 0.15s ease;
      border-radius: 0 0 8px 8px;
    }

    .bucket-handle {
      position: absolute;
      top: -8px;
      right: -12px;
      width: 28px;
      height: 40px;
      border: 4px solid var(--bucket-dark);
      border-bottom: none;
      border-radius: 50% 50% 0 0;
      z-index: 1;
    }

    /* Canvas для капель (позже) */
    #particles-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    /* ====== ФИНАЛЬНЫЙ ЭКРАН ====== */
    #screen-end {
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      gap: 1rem;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .end-title {
      font-family: 'Bangers', cursive;
      font-size: clamp(1.75rem, 8vw, 2.5rem);
      color: #2d1810;
      line-height: 1.2;
    }

    .end-score {
      font-size: 2.5rem;
      font-weight: 900;
      color: #0984e3;
    }

    .end-score small {
      font-size: 1rem;
      font-weight: 700;
      color: #5a4a3a;
    }

    .end-message {
      font-size: 1.25rem;
      font-weight: 700;
      color: #c45c26;
      min-height: 1.5em;
    }

    .end-record {
      font-size: 1rem;
      color: #5a4a3a;
    }

    .end-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

  <div id="landscape-block">
    <span style="font-size:3rem">📱↻</span>
    <p>Поверни телефон<br>вертикально!</p>
  </div>

  <div id="app">
    <canvas id="particles-canvas"></canvas>

    <!-- ====== МЕНЮ ====== -->
    <section id="screen-menu" class="screen active" aria-hidden="false">
      <span class="logo-emoji">🐄</span>
      <h1 class="logo">УВЕЛИЧЬ<br>НАДОЙ</h1>
      <p class="menu-record">🏆 Рекорд: <span id="menu-record">0.0</span> л</p>
      <button type="button" class="btn btn-primary" id="btn-start">СТАРТ</button>
    </section>

    <!-- ====== ИГРА ====== -->
    <section id="screen-game" class="screen" aria-hidden="true">
      <header class="top-bar">
        <div class="record-badge">
          <span>🏆</span>
          <span class="value" id="game-record">0.0</span>
          <span>л</span>
        </div>
        <div class="timer" id="timer">60</div>
        <div class="liters-display">
          <span class="value" id="liters">0.0</span> л
        </div>
      </header>

      <div class="cow-rear-zone">
        <div class="cow-rear" id="cow">
          <div class="cow-hind">
            <div class="cow-flank">
              <div class="cow-spine"></div>
              <div class="cow-spot s1"></div>
              <div class="cow-spot s2"></div>
              <div class="cow-spot s3"></div>
            </div>
            <div class="cow-tail"></div>
            <div class="cow-leg l1"></div>
            <div class="cow-leg l2"></div>
            <div class="cow-leg l3"></div>
            <div class="cow-leg l4"></div>
          </div>
          <div class="udder" id="udder" role="button" aria-label="Дой корову">
            <div class="udder-bag"></div>
            <div class="teat t1" data-teat="0"></div>
            <div class="teat t2" data-teat="1"></div>
            <div class="teat t3" data-teat="2"></div>
            <div class="teat t4" data-teat="3"></div>
          </div>
        </div>
      </div>

      <div class="bucket-zone">
        <div class="bucket-wrap">
          <div class="bucket" id="bucket">
            <div class="bucket-handle"></div>
            <div class="bucket-rim"></div>
            <div class="bucket-body">
              <div class="bucket-milk" id="bucket-milk"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ====== КОНЕЦ ====== -->
    <section id="screen-end" class="screen" aria-hidden="true">
      <h2 class="end-title">Время вышло!</h2>
      <p class="end-score"><span id="end-liters">0.0</span> <small>литров</small></p>
      <p class="end-message" id="end-message">—</p>
      <p class="end-record">🏆 Рекорд: <span id="end-record">0.0</span> л</p>
      <div class="end-buttons">
        <button type="button" class="btn btn-primary" id="btn-retry">ЕЩЁ РАЗ</button>
        <button type="button" class="btn btn-secondary" id="btn-share">Поделиться</button>
      </div>
    </section>
  </div>

  <script>
    // ====== КОНФИГ ======
    const CONFIG = {
      ROUND_SECONDS: 60,
      LITERS_PER_TAP: 0.1,
      COMBO_THRESHOLD_TPS: 5,
      COMBO_MULTIPLIER: 2,
      BUCKET_CAPACITY_L: 2,
      BUCKET_OVERFLOW_BONUS: 0.5,
      STORAGE_KEY: 'korova_highscore',
      TIMER_WARNING_SEC: 10,
    };

    // ====== СОСТОЯНИЕ ======
    const game = {
      state: 'menu',
      liters: 0,
      bucketFill: 0,
      timer: CONFIG.ROUND_SECONDS,
      highScore: 0,
      comboMultiplier: 1,
    };

    // ====== DOM ======
    const screens = {
      menu: document.getElementById('screen-menu'),
      game: document.getElementById('screen-game'),
      end: document.getElementById('screen-end'),
    };

    const els = {
      menuRecord: document.getElementById('menu-record'),
      gameRecord: document.getElementById('game-record'),
      timer: document.getElementById('timer'),
      liters: document.getElementById('liters'),
      bucketMilk: document.getElementById('bucket-milk'),
      endLiters: document.getElementById('end-liters'),
      endMessage: document.getElementById('end-message'),
      endRecord: document.getElementById('end-record'),
    };

  // ====== СТЕЙТ-МАШИНА ======
    function setState(next) {
      game.state = next;

      Object.values(screens).forEach((el) => {
        el.classList.remove('active');
        el.setAttribute('aria-hidden', 'true');
      });

      const screen = screens[next === 'gameover' ? 'end' : next === 'playing' ? 'game' : 'menu'];
      if (screen) {
        screen.classList.add('active');
        screen.setAttribute('aria-hidden', 'false');
      }
    }

    function loadHighScore() {
      const saved = parseFloat(localStorage.getItem(CONFIG.STORAGE_KEY));
      game.highScore = Number.isFinite(saved) ? saved : 0;
      updateRecordDisplays();
    }

    function saveHighScore() {
      if (game.liters > game.highScore) {
        game.highScore = game.liters;
        localStorage.setItem(CONFIG.STORAGE_KEY, String(game.highScore.toFixed(1)));
      }
      updateRecordDisplays();
    }

    function updateRecordDisplays() {
      const text = game.highScore.toFixed(1);
      els.menuRecord.textContent = text;
      els.gameRecord.textContent = text;
      els.endRecord.textContent = text;
    }

    function updateHUD() {
      els.liters.textContent = game.liters.toFixed(1);
      els.timer.textContent = Math.ceil(game.timer);
      els.timer.classList.toggle('warning', game.timer <= CONFIG.TIMER_WARNING_SEC && game.state === 'playing');

      const pct = Math.min(100, (game.bucketFill / CONFIG.BUCKET_CAPACITY_L) * 100);
      els.bucketMilk.style.height = pct + '%';
    }

    function getEndMessage(liters) {
      if (liters >= 15) return 'Доярка от бога! 🙏';
      if (liters >= 8) return 'Неплохо, корова довольна 😌';
      if (liters >= 3) return 'Ну такое, попробуй ещё 🤷';
      return 'Корова в шоке! 😱';
    }

    function resetRound() {
      game.liters = 0;
      game.bucketFill = 0;
      game.timer = CONFIG.ROUND_SECONDS;
      game.comboMultiplier = 1;
      updateHUD();
    }

    function startGame() {
      resetRound();
      setState('playing');
      updateHUD();
    }

    function endGame() {
      saveHighScore();
      els.endLiters.textContent = game.liters.toFixed(1);
      els.endMessage.textContent = getEndMessage(game.liters);
      setState('gameover');
    }

    // ====== СОБЫТИЯ ======
    document.getElementById('btn-start').addEventListener('click', startGame);
    document.getElementById('btn-retry').addEventListener('click', startGame);

    document.getElementById('btn-share').addEventListener('click', () => {
      const text = `Я надоил ${game.liters.toFixed(1)} л в «УВЕЛИЧЬ НАДОЙ»! 🐄🥛`;
      if (navigator.share) {
        navigator.share({ title: 'УВЕЛИЧЬ НАДОЙ', text }).catch(() => {});
      } else {
        navigator.clipboard?.writeText(text);
      }
    });

    // Заглушка тапа по вымени (этап 3)
    document.getElementById('udder').addEventListener('pointerdown', (e) => {
      if (game.state !== 'playing') return;
      e.preventDefault();
    });

    // ====== ИНИТ ======
    loadHighScore();
    setState('menu');
    updateHUD();

    // Resize canvas (для будущих частиц)
    const canvas = document.getElementById('particles-canvas');
    function resizeCanvas() {
      const app = document.getElementById('app');
      canvas.width = app.clientWidth;
      canvas.height = app.clientHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
  </script>
</body>
</html>
